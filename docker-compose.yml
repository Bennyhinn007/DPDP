version: "3.9"

services:
  # ─── MongoDB ─────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: dpdp_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: dpdp_healthcare_dev
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Ganache (Local Ethereum Blockchain) ─────────────────────
  ganache:
    image: trufflesuite/ganache:latest
    container_name: dpdp_ganache
    ports:
      - "8545:8545"
    command:
      - "--deterministic"
      - "--accounts=10"
      - "--defaultBalanceEther=1000"
      - "--gasLimit=6721975"
      - "--chain.chainId=1337"
      - "--database.dbPath=/ganache_data"
    volumes:
      - ganache_data:/ganache_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Flask Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dpdp_backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=dpdp_healthcare_dev
      - GANACHE_URL=http://ganache:8545
      - GANACHE_CHAIN_ID=1337
      - KEY_STORE_PATH=/app/keystore
      - CORS_ORIGINS=http://localhost:5173
      - PORT=5000
    env_file:
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
      ganache:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - keystore_data:/app/keystore
    restart: unless-stopped

  # ─── React Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dpdp_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mongodb_data:
  ganache_data:
  keystore_data:
